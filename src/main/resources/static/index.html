<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멋사 PBL - 멤버/과제 관리</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="toast-container"></div>

    <header>
        <h1>멋사 PBL 관리 시스템</h1>
        <p>Member &amp; Assignment API 테스트 UI</p>
    </header>

    <nav class="tabs">
        <button class="tab active" data-tab="member-tab">멤버 관리</button>
        <button class="tab" data-tab="assignment-tab">과제 관리</button>
    </nav>

    <main>
        <section id="member-tab" class="tab-content active"></section>
        <section id="assignment-tab" class="tab-content"></section>
    </main>

    <section class="log-panel">
        <div class="log-header">
            <h2>HTTP 통신 로그</h2>
            <button id="clear-log-btn" type="button">로그 지우기</button>
        </div>
        <pre id="http-log"></pre>
    </section>

    <script src="/js/member.js"></script>
    <script src="/js/assignment.js"></script>
    <script>
        const httpLog = document.getElementById('http-log');
        const toastContainer = document.getElementById('toast-container');

        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function appendLog(message) {
            httpLog.textContent += message + '\n';
            httpLog.scrollTop = httpLog.scrollHeight;
        }

        async function httpFetch(url, options = {}) {
            const method = options.method || 'GET';
            const headers = options.headers || {};
            const body = options.body;

            appendLog(`>>> ${method} ${url}`);
            if (body) {
                appendLog(`Request: ${body}`);
            }

            try {
                const response = await fetch(url, { method, headers, body });
                const text = await response.text();
                let data = null;

                if (text) {
                    try {
                        data = JSON.parse(text);
                    } catch {
                        data = text;
                    }
                }

                appendLog(`<<< ${response.status} ${response.statusText}`);
                if (text) {
                    appendLog(`Response: ${text}`);
                }
                appendLog('---');

                if (!response.ok) {
                    const message = data && data.message ? data.message : `요청 실패 (${response.status})`;
                    showToast(message);
                    throw new Error(message);
                }

                return data;
            } catch (error) {
                if (error.message === 'Failed to fetch') {
                    showToast('서버에 연결할 수 없습니다.');
                    appendLog('<<< Network Error');
                    appendLog('---');
                }
                throw error;
            }
        }

        document.querySelectorAll('.tab').forEach((button) => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach((tab) => tab.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach((content) => content.classList.remove('active'));
                button.classList.add('active');
                document.getElementById(button.dataset.tab).classList.add('active');
            });
        });

        document.getElementById('clear-log-btn').addEventListener('click', () => {
            httpLog.textContent = '';
        });

        document.addEventListener('DOMContentLoaded', () => {
            initMemberUI();
            initAssignmentUI();
            MemberUI.loadMembers();
        });
    </script>
</body>
</html>
